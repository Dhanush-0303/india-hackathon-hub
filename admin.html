<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🛠 Admin Panel - Add Hackathon</h2>

<input id="name" placeholder="Hackathon Name"><br><br>
<input id="organizer" placeholder="Organizer"><br><br>
<input id="prizePool" placeholder="Prize Pool"><br><br>
<input id="mode" placeholder="Online / Offline"><br><br>

<textarea id="description" placeholder="Description"></textarea><br><br>
<textarea id="eligibility" placeholder="Eligibility"></textarea><br><br>
<textarea id="rules" placeholder="Rules"></textarea><br><br>

<button onclick="addHackathon()">➕ Add Hackathon</button>

<script type="module" src="js/admin.js"></script>

</body>
</html>
